<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy PvP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#0A0E1C;--panel:#151D33;--panel2:#0F1626;--line:#27314F;--chalk:#EEF2FB;--dim:#8B97B8;
  --amber:#FFC247;--green:#54E0A8;--red:#FF6B6B;--blue:#5CA8FF;--purple:#B98BFF;--pink:#FF7EC4;
  /* cores por posição (frio→quente: defesa→ataque) */
  --pos-gk:#FFC247;--pos-def:#5CA8FF;--pos-mid:#54E0A8;--pos-att:#FF6B6B;--pos-flex:#B98BFF;
  /* cores por tática (família de ações) */
  --tac-muralha:#5CA8FF;--tac-pressaototal:#FF8A4C;--tac-cerebro:#54E0A8;--tac-tridente:#FF6B6B;--tac-aereo:#B98BFF;--tac-contra:#FFC247;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100%;overflow-x:hidden}
body{background:var(--bg)}
.app{min-height:100vh;background:radial-gradient(900px 360px at 50% -150px,#1D376E 0%,#12204022 52%,transparent 74%),linear-gradient(180deg,#0A0E1C 0%,#0B1020 42%,#080B16 100%);color:var(--chalk);font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:0 0 90px;max-width:100%;overflow-x:hidden}
.shell{width:100%;max-width:560px;padding:14px 14px 0}
.disp{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:'JetBrains Mono',monospace}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-top:4px}
.logo{font-family:'Saira Condensed';font-weight:800;font-size:22px;color:var(--amber);letter-spacing:.02em}
.logo small{color:var(--dim);font-size:11px;font-weight:600;letter-spacing:.1em}
.userchip{font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:99px;padding:5px 12px;cursor:pointer}
.userchip b{color:var(--chalk)}
.card{border:1px solid var(--line);background:linear-gradient(180deg,#151D33,#11182B);border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 10px 30px rgba(0,0,0,.16)}
.h1{font-size:23px;line-height:1.05;margin-bottom:5px}
.h2{font-size:16px;margin-bottom:7px}
.p{font-size:12px;color:var(--dim);line-height:1.45}
.btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;background:var(--amber);color:#0A0E1C;cursor:pointer;font-family:Inter}
.btn:disabled{background:#222c45;color:#5a6786;cursor:not-allowed}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--chalk)}
.btn.sm{padding:9px;font-size:13px;width:auto}
.input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--chalk);padding:12px;font-size:16px;font-family:Inter;margin-bottom:10px;outline:none}
.input:focus{border-color:var(--amber)}
.roomrow{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--panel2);cursor:pointer;transition:border-color .15s,transform .15s,background .15s,box-shadow .15s;overflow:hidden;flex-wrap:wrap}
.roomrow:hover{border-color:var(--amber);transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.18)}
.roomrow .info{flex:1;min-width:0}
.roomrow .nm{font-size:15px;font-weight:700}
.roomrow .meta{font-size:11px;color:var(--dim);margin-top:2px}
.statuspill{font-size:10px;font-weight:700;border-radius:99px;padding:4px 10px;letter-spacing:.06em}
.st-open{background:#143a2a;color:var(--green)}
.st-closed{background:#3a2e10;color:var(--amber)}
.st-finished{background:#1c3350;color:var(--blue)}
.homehero{border:1px solid #304166;background:linear-gradient(160deg,#1B2747,#10182C 58%,#0D1425);border-radius:14px;padding:15px;margin-bottom:10px;box-shadow:0 18px 42px rgba(0,0,0,.22)}
.heroTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.heroTitle{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:24px;color:var(--amber);line-height:1}
.heroSub{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.35}
.quickgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0}
.quickstat{border:1px solid var(--line);background:#0F1626;border-radius:10px;padding:9px;text-align:center}
.quickstat b{display:block;font-family:'JetBrains Mono';font-weight:800;font-size:18px;color:var(--chalk)}
.quickstat span{display:block;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.nextbox{border:1px solid color-mix(in srgb,var(--amber) 45%,var(--line));background:linear-gradient(180deg,#1e2233,#12192c);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.nextbox .nextIcon{width:34px;height:34px;border-radius:10px;background:var(--amber);color:#08101f;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.nextbox .nextTitle{font-size:13px;font-weight:800;color:var(--chalk)}
.nextbox .nextMeta{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.35}
.nextbox .nextGo{margin-left:auto;color:#0b1120;background:var(--amber);font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-radius:99px;padding:6px 9px;white-space:nowrap}
.legendbar{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px}
.legendbar span{font-size:9px;color:var(--dim);border:1px solid var(--line);border-radius:99px;padding:4px 8px;background:var(--panel2)}
.roomrow.gamecard{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:8px 10px;flex-wrap:nowrap}
.gamecard{position:relative;border-left:3px solid var(--line);padding:12px}
.gamecard.fin{border-left-color:var(--blue)}
.gamecard.open{border-left-color:var(--green)}
.gamecard.closed{border-left-color:var(--amber)}
.gamecard .info{grid-column:1;grid-row:1 / span 2}
.gamecard .nm{font-size:15px;line-height:1.15;word-break:normal;overflow-wrap:break-word}
.gamecard .meta{line-height:1.35}
.gamecard .scoremini{grid-column:2;grid-row:1;font-family:'JetBrains Mono';font-size:15px;font-weight:900;color:var(--blue);margin:0;text-align:right;white-space:nowrap}
.gamecard .statuswrap{grid-column:2;grid-row:2;display:flex;align-items:center;gap:6px;justify-content:flex-end;flex-shrink:0}
.gamecard .actionhint{grid-column:1 / -1;font-size:10px;color:var(--dim);margin-top:1px;text-align:right}
.scorebar{border:1px solid var(--line);background:linear-gradient(180deg,#1a2747,#0F1626);border-radius:13px;padding:11px 13px;margin-bottom:10px}
.tag{font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.score{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.team{font-size:20px;font-weight:800}
.vs{font-size:24px;color:var(--amber);font-weight:700}
.elo{font-size:10px;color:var(--dim)}
.buildhero{border:1px solid #304166;background:linear-gradient(160deg,#17213C,#10182C);border-radius:14px;padding:13px;margin-bottom:10px}
.buildtitle{font-size:22px;line-height:1.05;color:var(--chalk);margin-top:2px}
.budget{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.budget .val{font-size:24px;color:var(--amber)}
.budgetbar{height:8px;border-radius:99px;background:#0A1020;border:1px solid var(--line);overflow:hidden;margin-bottom:10px}
.budgetbar .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));border-radius:99px}
.lineupMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px}
.lineupMeta .mini{border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:8px;text-align:center}
.lineupMeta .mini b{font-family:'JetBrains Mono';font-size:15px;color:var(--chalk)}
.lineupMeta .mini span{display:block;font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.slot{border:1px solid var(--line);border-radius:10px;padding:8px;min-height:78px;background:#0F1626;position:relative;cursor:pointer;transition:border-color .15s,transform .15s,background .15s}
.slot:hover{border-color:#3b4b72;transform:translateY(-1px)}
.slot .lab{font-size:9px;letter-spacing:.14em;color:var(--dim)}
.slot .nm{font-size:12px;font-weight:600;margin-top:4px;line-height:1.2}
.slot .pr{font-size:10px;color:var(--amber);margin-top:2px}
.slot.empty{border-style:dashed}.slot.empty .nm{color:#46537a}
.cbtn{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cbtn.on{background:var(--amber);color:#0A0E1C;border-color:var(--amber)}
.postabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ptab{flex:1;text-align:center;font-size:11px;padding:7px 4px;border-radius:8px;border:1px solid var(--line);color:var(--dim);cursor:pointer;background:var(--panel2);min-width:50px}
.ptab.on{color:var(--chalk);border-color:var(--amber);background:#1c2746}
.sectionhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0 7px}
.sectionhead>span:first-child{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--chalk);font-size:17px}
.sectionhead>span:last-child{font-size:10px;color:var(--dim);text-align:right}
.sectionhead .title{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--chalk);font-size:17px}
.sectionhead .sub{font-size:10px;color:var(--dim)}
.pool{max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:11px;background:#0D1425}
.prow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #1c2746;cursor:pointer}
.prow:last-child{border-bottom:none}
.prow.sel{background:#1e2c50}
.prow .pos{font-size:10px;width:30px;color:var(--dim);font-weight:700}
.prow .nm{flex:1;font-size:13px;font-weight:600}
.prow .age{font-size:10px;color:var(--dim);font-weight:400}
.prow .pr{font-size:14px;color:var(--amber);font-weight:700}
.prow.dis{opacity:.35;cursor:not-allowed}
.prow.playerpick{position:relative;padding-top:11px;padding-bottom:11px}
.prow.playerpick.sel{background:#1e2c50}
.modepreview{border:1px solid var(--line);border-radius:12px;background:#0D1425;padding:10px;margin:8px 0 12px}
.modepreview .pvtitle{font-family:'Saira Condensed';font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.modepreview .pvtext{font-size:11px;color:var(--dim);line-height:1.4;margin-bottom:8px}
.previewgame{display:flex;align-items:center;gap:8px;border:1px solid #1c2746;border-radius:10px;background:var(--panel2);padding:8px;margin-top:6px}
.previewgame .pvname{flex:1;min-width:0;font-size:12px;font-weight:800;color:var(--chalk)}
.previewgame .pvmeta{font-size:10px;color:var(--dim);margin-top:2px}
.previewpill{font-size:10px;font-weight:900;border-radius:8px;padding:5px 8px;white-space:nowrap}
.previewcalc{font-size:10px;color:var(--dim);border-top:1px dashed var(--line);margin-top:8px;padding-top:8px;line-height:1.45}
.flag{font-size:9px;border-radius:3px;padding:1px 4px;margin-left:6px}
.tacts{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px}
.tact{min-width:150px;border:1px solid var(--line);border-radius:11px;padding:10px;cursor:pointer;background:var(--panel2);position:relative;overflow:hidden}
/* faixa de cor no topo do card da tática (cor-tema injetada via --tac inline) */
.tact .ttop{position:absolute;top:0;left:0;right:0;height:3px;background:var(--tac,var(--amber));opacity:.55}
.tact.on{border-color:var(--tac,var(--amber));background:color-mix(in srgb,var(--tac,var(--amber)) 14%,var(--panel2))}
.tact.on .ttop{opacity:1}
.tact .tn{font-size:13px;font-weight:700;color:var(--tac,var(--chalk))}
.tact .td{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.4}
.tact .teff{margin-top:7px;padding-top:6px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
.tact .teff .up{font-size:9.5px;color:var(--green);line-height:1.35}
.tact .teff .down{font-size:9.5px;color:var(--red);line-height:1.35}
.tact .teff .foco{font-size:9.5px;color:var(--dim);line-height:1.35}
.tact .teff .foco b{color:var(--tac,var(--chalk));font-weight:700}
.warn{font-size:11px;color:var(--red);margin:8px 0}
.ok{font-size:11px;color:var(--green);margin:8px 0}
.receipt{border:1px solid var(--line);border-radius:12px;background:var(--panel2);margin-bottom:7px;overflow:hidden}
.rhead{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer}
.rhead .sl{font-size:9px;color:var(--dim);letter-spacing:.12em;width:36px}
.rhead .nm{flex:1;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rhead .nm small{font-size:10px;color:var(--dim);font-weight:400}
.rhead .tot{font-size:18px;font-weight:700;color:var(--green)}
.rhead .tot.neg{color:var(--red)}
.badgeC{background:var(--amber);color:#0A0E1C;font-size:10px;font-weight:800;border-radius:5px;padding:2px 6px}
.rbody{border-top:1px dashed var(--line);padding:8px 12px 9px}
.line{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;color:var(--dim)}
/* ---- cores por posição ---- */
.pc-GK{color:var(--pos-gk)}.pc-DEF{color:var(--pos-def)}.pc-MID{color:var(--pos-mid)}.pc-ATT{color:var(--pos-att)}.pc-FLEX{color:var(--pos-flex)}
.pchip{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 7px;border-radius:6px;border:1px solid currentColor}
.bg-GK{background:color-mix(in srgb,var(--pos-gk) 18%,transparent)}
.bg-DEF{background:color-mix(in srgb,var(--pos-def) 18%,transparent)}
.bg-MID{background:color-mix(in srgb,var(--pos-mid) 18%,transparent)}
.bg-ATT{background:color-mix(in srgb,var(--pos-att) 18%,transparent)}
.bg-FLEX{background:color-mix(in srgb,var(--pos-flex) 18%,transparent)}
/* faixa lateral colorida por posição nos slots preenchidos */
.slot.filled{border-left-width:3px}
.slot.filled.s-GK{border-left-color:var(--pos-gk)}
.slot.filled.s-DEF{border-left-color:var(--pos-def)}
.slot.filled.s-MID{border-left-color:var(--pos-mid)}
.slot.filled.s-ATT{border-left-color:var(--pos-att)}
.slot.filled.s-FLEX{border-left-color:var(--pos-flex)}
/* pool: marca colorida por posição à esquerda da linha */
.prow .pos{font-weight:800}
.prow .posbar{width:3px;align-self:stretch;border-radius:3px;margin:-10px 0 -10px -12px;margin-right:9px}
.pb-GK{background:var(--pos-gk)}.pb-DEF{background:var(--pos-def)}.pb-MID{background:var(--pos-mid)}.pb-ATT{background:var(--pos-att)}
/* tag de time (cor injetada inline via --tc) */
.teamtag{font-size:9px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:5px;color:var(--tc,var(--dim));background:color-mix(in srgb,var(--tc,#888) 20%,transparent);border:1px solid color-mix(in srgb,var(--tc,#888) 35%,transparent)}
/* card do capitão recebe um anel âmbar sutil */
.slot.cap{box-shadow:0 0 0 1.5px var(--amber) inset,0 4px 16px -6px var(--amber)}
.line .v{color:var(--chalk)}.line .v.plus{color:var(--green)}.line .v.minus{color:var(--red)}
.line.total{border-top:1px dashed var(--line);margin-top:6px;padding-top:8px;color:var(--chalk);font-weight:700}
.bsub{font-size:10px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;margin:10px 0 4px;padding-top:8px;border-top:1px solid #1c2746}
.line.stat span:first-child{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.line.stat .cnt{color:var(--chalk);font-family:'JetBrains Mono';font-size:11px}
.line.stat .unit{color:#5a6786;font-size:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:10px;border:1px solid var(--line);border-radius:99px;padding:3px 9px;color:var(--dim)}
.daychip{font-size:11px;border:1px solid var(--line);border-radius:99px;padding:5px 12px;color:var(--dim);cursor:pointer;background:var(--panel2);user-select:none}
.daychip.on{color:#0e1525;border-color:var(--amber);background:var(--amber);font-weight:600}
.helpq{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1px solid var(--blue);color:var(--blue);font-size:11px;font-weight:700;cursor:pointer;margin-left:6px;vertical-align:middle;line-height:1}
.chip.arch{border-color:var(--amber);color:var(--amber)}
.rar{font-size:10px;font-weight:800;border-radius:99px;padding:3px 10px}
.r-Comum{background:#222c45;color:#9fb3a8}.r-Incomum{background:#143a2a;color:var(--green)}
.r-Raro{background:#1c3350;color:var(--blue)}.r-Épico{background:#321d52;color:var(--purple)}
.r-Mítico{background:#4a1d3a;color:var(--pink)}.r-Lendário{background:#4a3a10;color:var(--amber)}
.rank{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:7px;background:var(--panel2)}
.rank.me{border-color:var(--amber);background:#221f12}
.rank .po{font-family:'Saira Condensed';font-size:22px;width:30px;color:var(--dim)}
.rank.me .po{color:var(--amber)}
.rank .nm{flex:1;font-size:14px;font-weight:700}
.rank .nm small{display:block;font-size:10px;color:var(--dim);font-weight:400}
.rank .pt{font-size:19px;font-weight:700;color:var(--amber)}
.foot{font-size:10px;color:#5a6786;text-align:center;padding:14px 0 4px;line-height:1.7}
.loading{text-align:center;padding:30px;color:var(--dim);font-size:13px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:18px 14px calc(88px + env(safe-area-inset-bottom));z-index:100;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-width:100vw}
.modal .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;max-width:430px;width:100%;min-width:0;max-height:none;animation:popin .34s cubic-bezier(.16,1,.3,1);overflow:hidden}
.draghandle{touch-action:none;user-select:none;cursor:grab;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:10px;border:1px solid currentColor;color:inherit;background:rgba(255,255,255,.03);font-weight:900}
.draghandle:active{cursor:grabbing;transform:scale(.96)}
.confdrop{outline:2px solid var(--purple);outline-offset:2px;background:color-mix(in srgb,var(--purple) 16%,var(--panel2))}
.confpick{user-select:none;-webkit-user-select:none}
.confheld{outline:2px solid var(--purple);outline-offset:2px;background:color-mix(in srgb,var(--purple) 18%,var(--panel2))}
body.confdragging{overscroll-behavior:none}
body.confdragging .confpick{touch-action:none;-webkit-user-select:none;user-select:none}
.conforderbar{display:flex;gap:8px;align-items:center;justify-content:space-between;border:1px solid var(--purple);background:color-mix(in srgb,var(--purple) 13%,var(--panel2));border-radius:12px;padding:10px 11px;margin:0 0 12px}
.conforderbar b{color:var(--purple)}
.confordercard{touch-action:none;cursor:grab}
.confordercard:active{cursor:grabbing}
.confgrab{touch-action:none;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1px solid var(--purple);border-radius:11px;background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple);font-weight:900;padding:10px 12px;margin-top:9px}
.confghost{opacity:.72;transform:scale(.985)}
.confhint{font-size:10px;color:var(--purple);font-weight:800;margin-left:2px}
.dashgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}
.dashitem{border:1px solid var(--line);background:var(--panel2);border-radius:11px;padding:10px}
.dashitem b{display:block;font-size:18px;color:var(--chalk)}
.dashitem span{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.todoitem{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:9px 10px;margin-top:7px}
.todoitem.ok{border-color:color-mix(in srgb,var(--green) 45%,var(--line));background:color-mix(in srgb,var(--green) 8%,var(--panel2))}
.todoitem.warny{border-color:color-mix(in srgb,var(--red) 48%,var(--line));background:color-mix(in srgb,var(--red) 8%,var(--panel2))}
.feeditem{font-size:12px;color:var(--dim);border-left:2px solid var(--line);padding:5px 0 5px 10px;margin-top:6px}
.medalgrid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.medalcard{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:11px}
.medalcard b{color:var(--chalk)}
.medalcard small{display:block;color:var(--dim);margin-top:2px}
@keyframes popin{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:no-preference){
  .card,.homehero,.navpanel,.roomrow,.slot,.tact,.receipt,.rank,.modepreview{animation:softin .46s cubic-bezier(.16,1,.3,1) both}
  .btn,.ptab,.navtab,.statuspill,.userchip,.cbtn,.daychip,.chip{transition:transform .22s cubic-bezier(.16,1,.3,1),filter .22s ease,background .26s ease,border-color .26s ease,box-shadow .32s ease}
  .btn:active,.ptab:active,.navtab:active,.statuspill:active,.userchip:active,.cbtn:active,.daychip:active,.chip:active{transform:scale(.985);filter:brightness(1.04)}
  .roomrow,.slot,.tact,.modepreview,.receipt{position:relative}
  .roomrow::after,.slot::after,.tact::after,.receipt::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.045) 48%,transparent 76%);opacity:0;transform:translateX(-24%);transition:opacity .34s ease,transform .58s cubic-bezier(.16,1,.3,1);pointer-events:none}
  .roomrow:active::after,.slot:active::after,.tact:active::after,.receipt:active::after{opacity:1;transform:translateX(18%)}
  .slot.filled,.prow.sel{animation:selectedPop .38s cubic-bezier(.16,1,.3,1) both}
  .btn.ready{animation:readyPulse 2.4s ease-in-out infinite}
}
@keyframes softin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes selectedPop{0%{transform:scale(.992);box-shadow:0 0 0 rgba(255,194,71,0)}55%{transform:scale(1.006);box-shadow:0 0 0 2px rgba(255,194,71,.10)}100%{transform:scale(1);box-shadow:none}}
@keyframes readyPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,194,71,.22)}50%{box-shadow:0 0 0 7px rgba(255,194,71,0)}}
.expandable{display:grid;grid-template-rows:0fr;opacity:.35;overflow:hidden;transition:grid-template-rows .42s cubic-bezier(.16,1,.3,1),opacity .32s ease}
.expandable.open{grid-template-rows:1fr;opacity:1}
.expandable>div{min-height:0}
.expandable:not(.open)>.rbody{padding-top:0;padding-bottom:0;border-top:0}
.expandable:not(.open)>div{padding-top:0!important;padding-bottom:0!important;margin-top:0!important;margin-bottom:0!important;border-top:0!important}
.roomrow:nth-of-type(1){animation-delay:0ms}.roomrow:nth-of-type(2){animation-delay:38ms}.roomrow:nth-of-type(3){animation-delay:76ms}.roomrow:nth-of-type(4){animation-delay:114ms}.roomrow:nth-of-type(5){animation-delay:152ms}.roomrow:nth-of-type(6){animation-delay:190ms}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--amber);color:var(--chalk);padding:11px 18px;border-radius:10px;font-size:13px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:90vw;text-align:center;transition:opacity .2s}
details summary{cursor:pointer;font-size:11px;color:var(--dim);letter-spacing:.08em}
.metricbox{font-size:11px;color:var(--dim);line-height:1.8;border:1px dashed var(--line);border-radius:10px;padding:10px;margin-top:10px}
.prebox{border:1px solid #4a3a10;background:#1a1505;border-radius:10px;padding:8px 11px;margin-bottom:9px;font-size:11.5px;color:#d9c587;line-height:1.4}
/* navegação por abas na home */
.navtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.navtab{flex:1;min-width:calc(50% - 3px);display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Saira Condensed';font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;padding:10px 8px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer;transition:.15s}
.navtab .ic{font-size:14px}
.navtab .ct{font-size:10px;opacity:.7;font-weight:700}
.navtab.on{color:#0e1525;background:var(--amber);border-color:var(--amber)}
.navtab.on .ct{color:#0e1525}
.navpanel{animation:navfade .2s ease}
@keyframes navfade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
</style>
