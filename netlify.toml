# Proxy das fotos do SofaScore COM User-Agent de navegador.
# O _redirects sozinho nao manda User-Agent, e o SofaScore bloqueia (403).
# Aqui no netlify.toml da pra mandar headers customizados no proxy.

[[redirects]]
  from = "/sofa/*"
  to = "https://api.sofascore.app/api/v1/player/:splat"
  status = 200
  force = true
  [redirects.headers]
    User-Agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
    Referer = "https://www.sofascore.com/"
    Accept = "image/avif,image/webp,image/png,image/*,*/*"
